<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .profile-card {
      width: 420px;
      background: rgba(255, 255, 255, 0.1);
      padding: 35px 40px;
      border-radius: 18px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.45);
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .profile-card h2 {
      margin-bottom: 20px;
      color: #00ffcc;
    }

    .profile-card img {
      margin: 15px 0 20px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #00ffcc;
    }

    .profile-card p {
      margin: 8px 0;
      font-size: 15px;
      line-height: 1.6;
    }

    .profile-card strong {
      color: #1aff00;
    }

    button {
      margin-top: 25px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #1aff00, #a8ff00);
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button a {
      text-decoration: none;
      color: #000;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.4);
    }

    @media (max-width: 480px) {
      .profile-card {
        width: 90%;
        padding: 30px 25px;
      }
    }
  </style>
</head>

<body>

  <div class="profile-card">
    <h2>{{ name }}'s Profile</h2>

    {% if profile_pic %}
      <img src="{{ profile_pic.url }}" alt="Profile Picture" width="150" height="150">
    {% else %}
      <p><strong>Profile Picture:</strong> Not uploaded</p>
    {% endif %}

    <p><strong>Name:</strong> {{ name }}</p>
    <p><strong>Email:</strong> {{ email }}</p>
    <p><strong>Bio:</strong> {{ bio }}</p>
    <p><strong>Address:</strong> {{ address }}</p>

    <button>
      <a href="{% url 'recruiter_profile_update' %}">Update Profile</a>
    </button>
  </div>

</body>
</html>
