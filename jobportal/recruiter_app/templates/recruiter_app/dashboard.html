<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recruiter Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 50px;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
    }

    .logo {
      font-size: 26px;
      font-weight: 700;
      color: #00ffcc;
    }

    .nav-links {
      display: flex;
      gap: 25px;
    }

    .nav-links a {
      text-decoration: none;
      color: #ffffff;
      font-size: 16px;
      padding: 8px 18px;
      border-radius: 8px;
      transition: 0.3s;
    }

    .nav-links a:hover {
      background: #00ffcc;
      color: #000;
    }

    /* DASHBOARD CARD */
    .dashboard {
      min-height: calc(100vh - 80px);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      padding: 45px 70px;
      border-radius: 18px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.4);
      text-align: center;
    }

    h2 {
      color: #ffffff;
      margin-bottom: 30px;
    }

    h3 {
      color: #00ffcc;
      margin: 15px 0;
      transition: transform 0.2s, color 0.2s;
    }

    a {
      text-decoration: none;
    }

    a:hover h3 {
      color: #1aff00;
      transform: scale(1.05);
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .navbar {
        padding: 15px 25px;
        flex-direction: column;
        gap: 15px;
      }

      .nav-links {
        flex-wrap: wrap;
        justify-content: center;
      }
    }
    
    .nav-links a.logout {
      color: #ff6b6b;
    }

    .nav-links a.logout:hover {
      background: #ff6b6b;
      color: #000;
    }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">Job Portal</div>
    <div class="nav-links">
      <a href="{% url 'recruiter_profile' %}">Profile</a>
      <a href="{% url 'job_details' %}">Post Job</a>
      <a href="{% url 'applied_job' %}">Applications</a>
      <a href="{% url 'recruiter_logout' %}" class="logout">Logout</a>
      <!-- You can easily add more buttons here -->
    </div>
  </nav>

  <!-- DASHBOARD CONTENT -->
  <div class="dashboard">
    <div class="card">
      {% csrf_token %}
      <h2>Welcome to Dashboard , {{ username }}</h2>
      <a href="{% url 'recruiter_profile' %}"><h3>View Profile</h3></a>
    </div>
  </div>

</body>
</html>
