<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
}

center {
    background: rgba(255, 255, 255, 0.1);
    padding: 40px 60px;
    border-radius: 18px;
    box-shadow: 0 0 30px rgba(0, 0, 0, 0.4);
    text-align: center;
    width: 400px;
}

h2 {
    margin-bottom: 20px;
    color: #00ffcc;
}

p {
    margin: 10px 0;
    font-size: 15px;
}

img {
    border-radius: 50%;
    margin: 15px 0;
    object-fit: cover;
    border: 3px solid #00ffcc;
}

button {
    margin-top: 20px;
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #1aff00, #a8ff00);
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.4);
}

button a {
    text-decoration: none;
    color: #000;
}

    </style>
</head>
<body>
    <center>
        <h2>{{ name }}'s Profile</h2>
        {% if profile_pic %}
            <p><strong>Profile Picture:</strong></p>
            <img src="{{ profile_pic.url }}" alt="Profile Picture" width="150" height="150">
        {% else %}
            <p><strong>Profile Picture:</strong> Not uploaded</p>
        {% endif %}
        <p><strong>Name:</strong> {{ name }}</p>
        <p><strong>Email:</strong> {{ email }}</p>
        <p><strong>Bio:</strong> {{ bio }}</p>
        <p><strong>Address:</strong> {{ address }}</p>
        <button><a href="{% url 'candidate_profile_update' %}">Update Profile</a></button>

    </center>
</body>
</html>
