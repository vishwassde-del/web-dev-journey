<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Job Applications</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      padding: 40px;
      color: #fff;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
      color: #00ffcc;
      font-size: 36px;
    }

    .grid {
      max-width: 1100px;
      margin: auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
    }

    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.12);
      padding: 28px 25px 32px;
      border-radius: 18px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.45);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
    }

    /* BADGES */
    .badge {
      position: absolute;
      top: 18px;
      right: 18px;
      font-size: 12px;
      font-weight: bold;
      padding: 6px 14px;
      border-radius: 20px;
    }

    .badge.approved {
      background: linear-gradient(135deg, #1aff00, #a8ff00);
      color: #000;
    }

    .badge.processing {
      background: rgba(255, 255, 255, 0.25);
      color: #fff;
    }

    .card h2 {
      margin-bottom: 16px;
      color: #00ffcc;
      font-size: 20px;
    }

    .card p {
      font-size: 14px;
      margin-bottom: 8px;
    }

    /* STATUS */
    .status {
      margin-top: 22px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
    }

    .status .approved {
      color: #1aff00;
    }

    .status .processing {
      color: #ffd966;
    }

    /* CHECK ICON */
    .check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1aff00, #a8ff00);
      position: relative;
    }

    .check::after {
      content: "";
      position: absolute;
      left: 6px;
      top: 3px;
      width: 6px;
      height: 12px;
      border: solid #000;
      border-width: 0 3px 3px 0;
      transform: rotate(45deg);
    }

    /* SPINNER */
    .spinner {
      width: 22px;
      height: 22px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top: 3px solid #ffd966;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      body {
        padding: 25px;
      }

      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>

  <h1>My Job Applications</h1>

  <div class="grid">
    {% for i in user %}
    <div class="card">

      {% if i.scheduled %}
        <div class="badge approved">APPROVED</div>
      {% else %}
        <div class="badge processing">PROCESSING</div>
      {% endif %}

      <h2>{{ i.job_detail.company_name }}</h2>
      <p><b>Role:</b> {{ i.job_detail.job_role }}</p>
      <p><b>Location:</b> {{ i.job_detail.job_location }}</p>

      <div class="status">
        {% if i.scheduled %}
          <div class="check"></div>
          <span class="approved">Approved</span>
        {% else %}
          <div class="spinner"></div>
          <span class="processing">Processing</span>
        {% endif %}
      </div>

    </div>
    {% endfor %}
  </div>

</body>
</html>
